openapi: 3.0.3
info:
  title: Chat IA API
  version: 1.0.0
  description: API do sistema de chat integrado com IA

servers:
  - url: http://localhost:8080/api
    description: Local dev

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: "123456"

    LoginResponse:
      type: object
      required: [token, expiresIn]
      properties:
        token:
          type: string
          description: JWT token (HMAC-SHA256, expira em 24h)
          example: eyJhbGciOiJIUzI1NiIs...
        expiresIn:
          type: integer
          description: Tempo de expiração em segundos
          example: 86400

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          format: password
          minLength: 6
        email:
          type: string
          format: email

    RegisterResponse:
      type: object
      required: [id, username, createdAt]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        createdAt:
          type: string
          format: date-time

    SendMessageRequest:
      type: object
      required: [chatSessionId, content]
      properties:
        chatSessionId:
          type: string
          format: uuid
          description: ID da sessão de chat
        content:
          type: string
          maxLength: 10000
          description: Conteúdo da mensagem (máx 10.000 caracteres)

    MessageResponse:
      type: object
      required: [id, chatSessionId, role, content, timestamp]
      properties:
        id:
          type: string
          format: uuid
        chatSessionId:
          type: string
          format: uuid
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        timestamp:
          type: string
          format: date-time

    ChatSessionResponse:
      type: object
      required: [id, title, createdAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        createdAt:
          type: string
          format: date-time

    FileUploadResponse:
      type: object
      required: [fileId, fileName, fileSize, uploadedAt]
      properties:
        fileId:
          type: string
          format: uuid
        fileName:
          type: string
        fileSize:
          type: integer
          description: Tamanho do arquivo em bytes
          maximum: 5242880
        uploadedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [status, error, message, timestamp]
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    DocumentStatus:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED]
      description: Status do documento no pipeline de ingestão RAG

    DocumentResponse:
      type: object
      required: [id, fileName, fileSize, status, uploadedAt]
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        fileSize:
          type: integer
        mimeType:
          type: string
        status:
          $ref: '#/components/schemas/DocumentStatus'
        errorMessage:
          type: string
          nullable: true
        uploadedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true

    RagMessageResponse:
      type: object
      allOf:
        - $ref: '#/components/schemas/MessageResponse'
        - type: object
          properties:
            sources:
              type: array
              items:
                $ref: '#/components/schemas/DocumentResponse'
              description: Fontes utilizadas pelo RAG na resposta

paths:
  /auth/login:
    post:
      tags: [Autenticação]
      summary: Autenticar usuário e obter token JWT
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags: [Autenticação]
      summary: Registrar novo usuário
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Usuário cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Dados inválidos ou username já em uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/sessions:
    get:
      tags: [Chat]
      summary: Listar sessões de chat do usuário autenticado
      operationId: listSessions
      responses:
        '200':
          description: Lista de sessões retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatSessionResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Chat]
      summary: Criar nova sessão de chat
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  description: Título da sessão
      responses:
        '201':
          description: Sessão criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatSessionResponse'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/sessions/{sessionId}/messages:
    get:
      tags: [Chat]
      summary: Obter histórico de mensagens de uma sessão
      operationId: getMessages
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID da sessão de chat
      responses:
        '200':
          description: Histórico de mensagens retornado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/messages:
    post:
      tags: [Chat]
      summary: Enviar uma mensagem no chat
      operationId: sendMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: Mensagem enviada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: 'Dados inválidos (ex: conteúdo vazio ou excede 10.000 caracteres)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/files:
    post:
      tags: [Chat]
      summary: Fazer upload de arquivo anexo (TXT ou PDF, máx 5MB)
      operationId: uploadFile
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Arquivo .txt ou .pdf (tamanho máximo 5.242.880 bytes)
      responses:
        '200':
          description: Arquivo enviado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Formato inválido (apenas TXT e PDF são aceitos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '413':
          description: Arquivo excede o limite de 5MB (5.242.880 bytes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat/files/{fileId}:
    get:
      tags: [Chat]
      summary: Baixar arquivo anexado
      operationId: downloadFile
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID do arquivo
      responses:
        '200':
          description: Arquivo baixado com sucesso
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Arquivo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /health:
    get:
      tags: [Infraestrutura]
      summary: Verificar saúde da aplicação
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: Aplicação saudável
          content:
            application/json:
              schema:
                type: object
                required: [status, timestamp]
                properties:
                  status:
                    type: string
                    example: UP
                  timestamp:
                    type: string
                    format: date-time
